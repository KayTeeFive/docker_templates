services:
  ollama-vulkan:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ollama-vulkan
    hostname: ollama-vulkan
    environment:
      - MODEL=${OLLAMA_LLM_MODEL}                       # Default Ollama LLM model (will be automatically pulled if it doesn't exist locally)
      - OLLAMA_HOST="0.0.0.0:11434"                     # Address and port the Ollama server listens on
      - OLLAMA_CONTEXT_LENGTH=${OLLAMA_CONTEXT_LENGTH}  # Maximum number of tokens the server will accept in a single prompt
      - OLLAMA_FLASH_ATTENTION=true                     # Enables FlashAttention for faster prefill and lower memory bandwidth usage (if supported by the backend/GPU)
      - OLLAMA_GPU_OVERHEAD=256                         # Reserves 256 MB of VRAM for safety to prevent out-of-memory during allocations
      - OLLAMA_NUM_PARALLEL=1                           # Limits inference to a single parallel request to avoid KV-cache duplication and VRAM spikes
      - OLLAMA_NEW_ENGINE=true                          # Forces the new Ollama inference engine instead of the legacy runner
      - OLLAMA_KV_CACHE_OPTIMIZATION=1
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE}
      - OLLAMA_GPU_LAYERS=${OLLAMA_GPU_LAYERS}
      - OLLAMA_VULKAN=1                                 # Enable Vulkan backend for GPU inference
      - GGML_VK_VISIBLE_DEVICES=${VK_VISIBLE_DEVICES}   # Select which GPU(s) Vulkan should use
      - GGML_VULKAN_FORCE_MMQ=1
      - GGML_VULKAN_DEBUG=0
    tty: true
    #privileged: true
    devices:
      - /dev/dri
    ipc: host
    shm_size: "8g"
    ulimits:
      memlock: -1
    cpus: 8
    #ports:
    #  - "${HOST_IP}:11434:11434"
    volumes:
      - "${OLLAMA_DATA}:/root/.ollama"

  ollama-open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ollama-open-webui
    hostname: ollama-open-webui
    depends_on:
      - ollama-vulkan
    environment:
      - 'OLLAMA_BASE_URL=http://ollama-vulkan:11434'
      - 'WEBUI_SECRET_KEY='
    #extra_hosts:
    #  - host.docker.internal:host-gateway
    ports:
      - "${HOST_IP}:${HOST_PORT}:8080"
    volumes:
      - "${WEBUI_DATA}:/app/backend/data"

