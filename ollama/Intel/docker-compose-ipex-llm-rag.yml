services:
  ollama-ipex-llm-model:
    image: intelanalytics/ipex-llm-inference-cpp-xpu:latest
    container_name: ollama-ipex-llm-model
    hostname: ollama-ipex-llm-model
    environment:
      - MODEL=${OLLAMA_LLM_MODEL}
      - OLLAMA_HOST="0.0.0.0:11434"
      - OLLAMA_CONTEXT_LENGTH=${OLLAMA_CONTEXT_LENGTH}  # Maximum number of tokens the server will accept in a single prompt
      - OLLAMA_FLASH_ATTENTION=true                     # Enables FlashAttention for faster prefill and lower memory bandwidth usage (if supported by the backend/GPU)
      - OLLAMA_GPU_OVERHEAD=256                         # Reserves 256 MB of VRAM for safety to prevent out-of-memory during allocations
      - OLLAMA_NUM_PARALLEL=1                           # Limits inference to a single parallel request to avoid KV-cache duplication and VRAM spikes
      - OLLAMA_NEW_ENGINE=true                          # Forces the new Ollama inference engine instead of the legacy runner
      - OLLAMA_KV_CACHE_OPTIMIZATION=1
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE}
      - OLLAMA_GPU_LAYERS=${OLLAMA_GPU_LAYERS}
      - OLLAMA_INTEL_GPU=true
      - OLLAMA_NUM_GPU=999
      - DEVICE=Arc
      - ZES_ENABLE_SYSMAN=1
      - ONEAPI_DEVICE_SELECTOR=level_zero:0
      # - GGML_SYCL_DISABLE_OPT=0
      # - GGML_SYCL_DISABLE_GRAPH=0
      # - GGML_SYCL_F16=1
    tty: true
    privileged: true
    devices:
      - /dev/dri
    volumes:
      - "${OLLAMA_DATA}:/root/.ollama"
    command: sh -c 'mkdir -p /llm/ollama && cd /llm/ollama && init-ollama && exec ./ollama serve'

  ollama-ipex-embed-model:
    image: intelanalytics/ipex-llm-inference-cpp-xpu:latest
    container_name: ollama-ipex-embed-model
    hostname: ollama-ipex-embed-model
    environment:
      - MODEL=${OLLAMA_EMBED_MODEL}
      - OLLAMA_HOST="0.0.0.0:11434"
      - OLLAMA_CONTEXT_LENGTH=${OLLAMA_CONTEXT_LENGTH}  # Maximum number of tokens the server will accept in a single prompt
      - OLLAMA_FLASH_ATTENTION=true                     # Enables FlashAttention for faster prefill and lower memory bandwidth usage (if supported by the backend/GPU)
      - OLLAMA_GPU_OVERHEAD=256                         # Reserves 256 MB of VRAM for safety to prevent out-of-memory during allocations
      - OLLAMA_NUM_PARALLEL=1                           # Limits inference to a single parallel request to avoid KV-cache duplication and VRAM spikes
      - OLLAMA_NEW_ENGINE=true                          # Forces the new Ollama inference engine instead of the legacy runner
      - OLLAMA_KV_CACHE_OPTIMIZATION=1
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE}
      - OLLAMA_GPU_LAYERS=${OLLAMA_GPU_LAYERS}
      - OLLAMA_INTEL_GPU=true
      - OLLAMA_NUM_GPU=999
      - DEVICE=Arc
      - ZES_ENABLE_SYSMAN=1
      - ONEAPI_DEVICE_SELECTOR=level_zero:0
      # - GGML_SYCL_DISABLE_OPT=0
      # - GGML_SYCL_DISABLE_GRAPH=0
      # - GGML_SYCL_F16=1
    tty: true
    privileged: true
    devices:
      - /dev/dri
    volumes:
      - "${OLLAMA_DATA}:/root/.ollama"
    command: sh -c 'mkdir -p /llm/ollama && cd /llm/ollama && init-ollama && exec ./ollama serve'

  ollama-qdrant:
    image: qdrant/qdrant
    container_name: ollama-qdrant
    hostname: ollama-qdrant
    volumes:
      - "${QDRANT_DATA}:/qdrant/storage"

  ollama-anythingllm:
    image: mintplexlabs/anythingllm:latest
    container_name: ollama-anythingllm
    hostname: ollama-anythingllm
    depends_on:
      - ollama-ipex-llm-model
      - ollama-ipex-embed-model
      - ollama-qdrant
    cap_add:
      - SYS_ADMIN
    environment:
      - LLM_PROVIDER=ollama
      - EMBEDDING_MODEL_PREF=nomic-embed-text:latest
      - OLLAMA_BASE_PATH=http://ollama-ipex-llm-model:11434
      - OLLAMA_MODEL_PREF=llama3.1:8b
      - OLLAMA_MODEL_TOKEN_LIMIT=4096
      - OLLAMA_PERFORMANCE_MODE=base
      - OLLAMA_KEEP_ALIVE_TIMEOUT=300
      - EMBEDDING_ENGINE=ollama
      - EMBEDDING_BASE_PATH=http://ollama-ipex-embed-modelollama-ipex-embed-model:11434
      - EMBEDDING_MODEL_MAX_CHUNK_LENGTH=8192
      - VECTOR_DB=qdrant
      - QDRANT_ENDPOINT=http://ollama-qdrant:6333
      - STORAGE_DIR=/app/server/storage
      - SERVER_PORT=${HOST_PORT}
    ports:
      - "${HOST_IP}:${HOST_PORT}:${HOST_PORT}"
    volumes:
      - "${ANYLLM_DATA}/storage:/app/server/storage"
      - "${ANYLLM_DATA}/.env:/app/server/.env"
